apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-interviewer-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: <AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/ai-interviewer-backend:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: ai-interviewer-config
        - secretRef:
            name: ai-interviewer-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
  - port: 80
    targetPort: 8000
