apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-interviewer-frontend
  labels:
    app: frontend
spec:
  replicas: 1   # 1 replica during testing to save money
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        # ── Image URL is filled in by the deploy.ps1 script after terraform apply ──
        image: PLACEHOLDER_ECR_FRONTEND_URL:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          valueFrom:
            configMapKeyRef:
              name: ai-interviewer-config
              key: NEXT_PUBLIC_API_URL
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
